<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordskog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" aria-live="polite">
    <section class="banner-shell" id="bannerShell" title="Klikk for å tilpasse stilen" role="button" tabindex="0" aria-label="Tilpass stil">
      <img class="banner-image" id="bannerImage" src="banner.png" alt="Ordskog-banner med rev og fugl i skogen" />
      <div class="banner-custom-display" id="bannerCustomDisplay" aria-hidden="true"></div>
    </section>

    <section class="game-panel" id="gamePanel">
      <div id="celebration" class="celebration-layer" aria-hidden="true"></div>

      <div class="status-strip" aria-label="Spillstatus">
        <span class="status-item">Runde <strong id="roundInfo">1 / 20</strong></span>
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-item">Poeng <strong id="scoreInfo">0</strong></span>
      </div>

      <div class="scramble-stage">
        <div class="scramble" aria-label="Rotete ord" id="scrambledWord">--</div>
      </div>

      <form id="guessForm" autocomplete="off" class="guess-form">
        <label for="guessInput" class="sr-only">Skriv svaret ditt</label>
        <div class="input-row">
          <input
            id="guessInput"
            name="guessInput"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="Skriv ordet her"
            aria-label="Gjett ordet"
            required
            maxlength="20"
          />
          <button class="primary-button" type="submit">Sjekk</button>
        </div>
      </form>

      <div class="action-row">
        <div class="hint-controls">
          <button id="hintButton" class="secondary-button" type="button">Hint<span class="keyboard-hint"> (1)</span></button>
          <button id="nextButton" class="secondary-button" type="button">Neste ord<span class="keyboard-hint"> (2)</span></button>
          <button id="reshuffleButton" class="secondary-button" type="button">Stokk om<span class="keyboard-hint"> (3)</span></button>
          <button id="caseToggleButton" class="secondary-button" type="button">Store bokstaver</button>
        </div>
        <p class="shortcut-note">Enter for å sjekke</p>
      </div>

      <div class="game-notes">
        <p id="message" class="message">Klar for første ord?</p>
        <p id="history" class="history" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <div id="bannerPicker" class="banner-picker-overlay" aria-hidden="true">
    <div class="banner-picker-panel" role="dialog" aria-modal="true" aria-label="Tilpass stil">
      <h2 class="banner-picker-title">Tilpass stil</h2>
      <div class="banner-picker-section">
        <p class="banner-picker-label">Farge</p>
        <div class="banner-color-swatches" id="bannerColorSwatches"></div>
      </div>
      <div class="banner-picker-section">
        <p class="banner-picker-label">Dyr</p>
        <div class="banner-animal-grid" id="bannerAnimalGrid"></div>
      </div>
      <div class="banner-picker-actions">
        <button class="primary-button" id="bannerApplyButton" type="button">Bruk</button>
        <button class="secondary-button" id="bannerCancelButton" type="button">Avbryt</button>
      </div>
    </div>
  </div>

  <script src="dictionary.js"></script>
  <script src="app.js"></script>
</body>
</html>
